<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgMain" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#020818"/>
