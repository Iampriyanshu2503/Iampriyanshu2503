  </linearGradient>
  <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00fff0" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00fff0" stop-opacity="1"/>
    <stop offset="100%" stop-color="#00fff0" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="magentaGlow" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff00cc" stop-opacity="0"/>
    <stop offset="50%" stop-color="#ff00cc" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#ff00cc" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00fff0"/>
    <stop offset="50%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#bf5af2"/>
  </linearGradient>
  <linearGradient id="leftBloom" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00fff0" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#00fff0" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="rightBloom" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#bf5af2" stop-opacity="0"/>
    <stop offset="100%" stop-color="#bf5af2" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="circuitFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00fff0" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00fff0" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="circuitFadeR" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#bf5af2" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#bf5af2" stop-opacity="0"/>
  </linearGradient>
  <filter id="nameBloom">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="lineGlow">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="subtleGlow">
    <feGaussianBlur stdDeviation="1.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="bannerClip">
    <rect x="0" y="0" width="680" height="200" rx="8"/>
  </clipPath>
</defs>
