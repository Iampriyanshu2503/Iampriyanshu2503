name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: Iampriyanshu2503
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin output || true
          git checkout output 2>/dev/null || git checkout --orphan output
          cp dist/github-snake.svg ./github-snake.svg
          cp dist/github-snake-dark.svg ./github-snake-dark.svg
          git add github-snake.svg github-snake-dark.svg
          git commit -m "Update snake" || echo "No changes"
          git push origin output --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
