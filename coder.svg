<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="deskGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a0e1a"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>
  <linearGradient id="screenGlow1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1f3c"/>
    <stop offset="100%" stop-color="#0a1628"/>
  </linearGradient>
  <linearGradient id="screenGlow2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d2a2a"/>
    <stop offset="100%" stop-color="#091a1a"/>
  </linearGradient>
  <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0f1e2e"/>
    <stop offset="100%" stop-color="#0a1520"/>
  </linearGradient>
  <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00fff0" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00fff0" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#00fff0" stop-opacity="0"/>
  </linearGradient>
  <filter id="softBloom">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tinyBloom">
    <feGaussianBlur stdDeviation="1.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="screen1Clip">
    <rect x="148" y="82" width="178" height="130" rx="2"/>
  </clipPath>
  <clipPath id="screen2Clip">
    <rect x="338" y="70" width="192" height="140" rx="2"/>
  </clipPath>
</defs>

<!-- Background -->
<rect width="680" height="420" fill="#070b14"/>

